version: '3.8'

networks:
  sparknet:
    driver: bridge

# ─────────────────────────── AIRFLOW COMMON CONFIG ──────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.11
  environment: &airflow-common-env
    AIRFLOW_UID: 0
    AIRFLOW_GID: 0
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-c7fcdddc20b0c9fbb32f2e37830f117fbd2f7c7a0af588870dc36d7984aec5da}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1
    AIRFLOW__LOGGING__LOG_LEVEL: INFO
    _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-apache-spark apache-airflow-providers-snowflake snowflake-connector-python
    SPARK_HOME: /usr/local/spark
    HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    YARN_CONF_DIR: /opt/hadoop/etc/hadoop
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    TMDB_API_KEY: ${TMDB_API_KEY:-your_api_key_here}
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
    SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-TMDB_DWH}
    SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-ANALYTICS}
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}
    SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-TRANSFORMER}
    PYSPARK_PYTHON: python3
    PYSPARK_DRIVER_PYTHON: python3

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./config:/opt/airflow/config
    - ./spark_jobs:/opt/airflow/spark_jobs
    - ./spark-download:/opt/spark-download
    - spark_data:/opt/spark-3.4.0-bin-hadoop3
  user: "0:0"
  depends_on:
    postgres_airflow:
      condition: service_healthy
  networks: [sparknet]

services:

  # ────────────────────── AIRFLOW POSTGRES DB ──────────────────────
  postgres_airflow:
    image: postgres:13-alpine
    container_name: postgres_airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      POSTGRES_INITDB_ARGS: ""
    volumes:
      - airflow_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [sparknet]

  # ────────────────────── AIRFLOW INIT ──────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    user: "0:0"
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y openjdk-17-jdk-headless curl &&
      export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64 &&
      export SPARK_HOME=/usr/local/spark &&
      export PYSPARK_PYTHON=python3 &&
      export PYSPARK_DRIVER_PYTHON=python3 &&
      tar xzf /opt/spark-download/spark-3.4.0-bin-hadoop3.tgz -C /opt/ &&
      ln -s /opt/spark-3.4.0-bin-hadoop3 /usr/local/spark &&
      echo 'export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64' >> ~/.bashrc &&
      echo 'export SPARK_HOME=/usr/local/spark' >> ~/.bashrc &&
      echo 'export PYSPARK_PYTHON=python3' >> ~/.bashrc &&
      echo 'export PYSPARK_DRIVER_PYTHON=python3' >> ~/.bashrc &&
      echo 'export PATH=\$PATH:\$SPARK_HOME/bin' >> ~/.bashrc &&
      chown -R 50000:0 /usr/local/spark &&
      chown -R 50000:0 /opt/spark-3.4.0-bin-hadoop3 &&
      airflow db init &&
      airflow users create --username airflow --password airflow --firstname admin --lastname user --role Admin --email admin@example.com || true &&
      airflow connections add 'spark_yarn' --conn-type spark --conn-host yarn://resourcemanager --conn-extra '{\"queue\": \"default\", \"deploy_mode\": \"client\"}' || true &&
      airflow connections add 'snowflake_conn' --conn-type snowflake --conn-login \${SNOWFLAKE_USER} --conn-password \${SNOWFLAKE_PASSWORD} --conn-host \${SNOWFLAKE_ACCOUNT}.snowflakecomputing.com --conn-extra '{\"database\": \"\${SNOWFLAKE_DATABASE}\", \"schema\": \"\${SNOWFLAKE_SCHEMA}\", \"warehouse\": \"\${SNOWFLAKE_WAREHOUSE}\", \"role\": \"\${SNOWFLAKE_ROLE}\"}' || true
      "

  # ────────────────────── AIRFLOW WEBSERVER ──────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: airflow webserver
    ports:
      - "18080:8080"
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
      AIRFLOW__WEBSERVER__EXPOSE_HOSTNAME: 'true'
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────────── AIRFLOW SCHEDULER ──────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────────── HADOOP NAMENODE ──────────────────────
  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-namenode
    hostname: hadoop-namenode
    environment:
      CLUSTER_NAME: tmdb-hadoop-cluster
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:9000
      HDFS_CONF_dfs_replication: 2
      HDFS_CONF_dfs_permissions_enabled: 'false'
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: 'false'
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data:/data
    networks: [sparknet]
    healthcheck:
      test: ["CMD-SHELL", "hdfs dfs -ls / > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ────────────────────── HADOOP DATANODE ──────────────────────
  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode
    hostname: hadoop-datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:9000
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: 'false'
      HDFS_CONF_dfs_datanode_data_dir_permission: '700'
    depends_on:
      hadoop-namenode:
        condition: service_healthy
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
      - ./data:/data
    networks: [sparknet]

  # ────────────────────── YARN RESOURCEMANAGER ──────────────────────
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    hostname: resourcemanager
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:9000
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      YARN_CONF_yarn_scheduler_maximum___allocation___mb: 5120
      YARN_CONF_yarn_scheduler_maximum___allocation___vcores: 4
      YARN_CONF_yarn_nodemanager_resource_memory___mb: 4096
      YARN_CONF_yarn_nodemanager_resource_cpu___vcores: 2
      YARN_CONF_yarn_resourcemanager_scheduler_class: org.apache.hadoop.yarn.server.resourcemanager.scheduler.capacity.CapacityScheduler
    ports:
      - "8088:8088"
      - "8032:8032"
    networks: [sparknet]
    depends_on:
      hadoop-namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8088/ws/v1/cluster/info > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# ────────────────────── YARN NODEMANAGER ──────────────────────
  nodemanager:
    build:
      context: ./docker/nodemanager
      dockerfile: Dockerfile
    container_name: nodemanager
    hostname: nodemanager
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hadoop-namenode:9000
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      YARN_CONF_yarn_scheduler_maximum___allocation___mb: 4096
      YARN_CONF_yarn_scheduler_maximum___allocation___vcores: 4
      YARN_CONF_yarn_nodemanager_resource_memory___mb: 4096
      YARN_CONF_yarn_nodemanager_resource_cpu___vcores: 2
      PYSPARK_PYTHON: /opt/miniconda/bin/python3.11
      PYSPARK_DRIVER_PYTHON: /opt/miniconda/bin/python3.11
    networks: [sparknet]
    depends_on:
      resourcemanager:
        condition: service_healthy
    volumes:
      - ./data:/data
      - ./spark_jobs:/spark_jobs
  # ────────────────────── JUPYTER PYSPARK ──────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter
    hostname: jupyter
    ports:
      - "8899:8888"
      - "4040:4040"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./spark_jobs:/home/jovyan/spark_jobs
      - jupyter_data:/home/jovyan/jupyter_data
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - TMDB_API_KEY=${TMDB_API_KEY}
      - YARN_CONF_DIR=/opt/hadoop/etc/hadoop
      - PYSPARK_PYTHON=/opt/conda/bin/python
      - PYSPARK_DRIVER_PYTHON=/opt/conda/bin/python
      - SPARK_HOME=/usr/local/spark
    command: >
      bash -c "pip install snowflake-sqlalchemy snowflake-connector-python plotly dash &&
      jupyter lab --ip=0.0.0.0 --allow-root --no-browser"
    networks: [sparknet]
    depends_on:
      - resourcemanager

  # ────────────────────── PLOTLY DASH DASHBOARD ──────────────────────
  plotly-dash:
    image: jupyter/pyspark-notebook:latest
    container_name: plotly-dash
    hostname: plotly-dash
    working_dir: /app
    command: >
      bash -c "pip install dash plotly pandas snowflake-connector-python &&
      python app.py"
    ports:
      - "8050:8050"
    volumes:
      - ./dashboard:/app
      - ./data:/home/jovyan/data
    environment:
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-TMDB_DWH}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-ANALYTICS}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}
    networks: [sparknet]

volumes:
  airflow_db:
    driver: local
  hadoop_namenode:
    driver: local
  hadoop_datanode:
    driver: local
  jupyter_data:
    driver: local
  spark_data:
    driver: local